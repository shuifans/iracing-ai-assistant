# ai.iracing.club — iRacing AI Assistant (HTTPS)

# HTTP -> HTTPS redirect
server {
    if ($host = ai.iracing.club) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name ai.iracing.club;
    return 301 https://$server_name$request_uri;


}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.iracing.club;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/ai.iracing.club/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ai.iracing.club/privkey.pem; # managed by Certbot
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block sensitive paths
    location ~ ^/(\.git|\.env|data/) {
        deny all;
        return 404;
    }

    location ~ ^/api/health/(?!live|ready) {
        deny all;
        return 404;
    }

    # SSE endpoints — disable buffering, long timeout
    location ~ ^/api/chat/messages {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Cache-Control 'no-cache';
        proxy_set_header X-Accel-Buffering no;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API and web — 25MB body limit
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 25m;
        proxy_read_timeout 60s;
    }

}

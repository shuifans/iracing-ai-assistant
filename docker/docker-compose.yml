services:
  iracing-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /srv/iracing-ai-assistant/data:/data
    env_file:
      - ../.env
    command: ["/app/scripts/start-container.sh"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
